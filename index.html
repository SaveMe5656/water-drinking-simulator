<!DOCTYPE html>
<html lang="en">

<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@latest/lib/p5.js"></script>
	<script src="/cookies.js"></script>

	<link id="icon" rel="shortcut icon" href="/assets/image.ico">
	<link rel="stylesheet" href="/style.css">

	<meta name="color-scheme" class="theme" content="light dark" />
	<style class="theme"></style>

	<style>
		:root {
			--border: .33em;
			--border-style: solid var(--outline, initial);
		}

		body {
			background-color: var(--page-bg, initial);
			color: var(--page-color, initial);
		}

		canvas {
			display: block;
		}

		#gerald {
			border: 1px var(--border-style);
			border-radius: 2.5px;
		}

		#config {
			border: 2px var(--border-style);
			border-radius: var(--border);
			padding: var(--border);
			background-color: var(--background);
			display: inline-block;
			width: 17.5em;

			a:link {
				color: var(--link, initial);
			}

			a:visited {
				color: var(--link-visited, initial);
			}
		}
	</style>

	<title>water drinking simulator</title>
	<meta charset="UTF-8">
</head>

<body>
	<main></main>
	<script src="sketch.js"></script>
	<button id="save" onclick="saveGame()">
		<img class="emoji" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/svg/1f4be.svg" alt="&#x1F5AB;">
		save
	</button>
	<button id="reset" onclick="initGame()">
		<img class="emoji" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/svg/1f504.svg" alt="&#x27F3;">
		reset
	</button>

	<br><br>

	<div id="config">
		<div id="options">
			<strong>options:</strong>
			<br>
			<label for="autosave">autosave:</label>
			<input id="autosave" type="checkbox" onchange="saveGame('autosave')">
			<br>
			<label for="music">music:</label>
			<input id="music" type="checkbox" onchange="testBgmPlayback()" checked>
			<br>
			<label for="theme">theme:</label>
			<select id="theme" onchange="setTheme()">
				<option value="default">default</option>
				<option value="basic">basic</option>
				<option value="light">light</option>
				<option value="dark">dark</option>
			</select>
		</div>
		<br>
		<div id="difficulty">
			<strong>gameplay modifiers:</strong>
			<button id="resetParam"
				onclick="for (x of document.getElementById('difficulty').getElementsByTagName('input')) x.value = undefined ">
				<img class="emoji" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/svg/1f504.svg" alt="&#x27F3;">
			</button>
			<br>
			<span>bottle capacity:</span>
			<input id="bottleIn" type="number" min="1" max="100" placeholder="30">
			<br>
			<span>dehydration time:</span>
			<input id="speedIn" type="number" min="1" max="999" placeholder="90">
			<br>
			<span>cooldown:</span>
			<input id="cooldownIn" type="number" min="1" max="60" step="0.01" placeholder="2.28">
			<br>
			<span class="subinfo">*modifiers require game reset to apply</span>
		</div>
		<br>
		<button onclick="migrateSave()">restore old data</button>
		<br>
		<span class="subinfo">see <a href="changelog#ver-140">changelog</a> for details</span>
	</div>

	<br>
	<span class="subinfo">
		<span id="version">...</span>
		|
		<a href="about">about</a>
		|
		<a href="changelog">changelog</a>
	</span>

	<br><br>

	<span class="subinfo">
		<img class="emoji" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/svg/1f36a.svg" alt="&#x1F36A;">
		this page uses cookies to save configuration and gameplay data
	</span>

	<script src="theme.js"></script>
	<script src="swapicon.js"></script>
</body>

</html>
