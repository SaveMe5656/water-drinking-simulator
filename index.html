<!DOCTYPE html>
<html lang="en">

<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@latest/lib/p5.js"></script>
	<script src="/assets/cookies.js"></script>

	<script src="/assets/load.js"></script>
	<script src="/assets/emoji-img.js"></script>

	<meta name="color-scheme" class="theme" content="light dark" />
	<style class="theme"></style>

	<style>
		:root {
			--border: .33em;
			--border-style: solid var(--outline, initial);
		}

		body {
			background-color: var(--page-bg, initial);
			color: var(--page-color, initial);
		}

		canvas {
			display: block;
		}

		#gerald {
			border: 1px var(--border-style);
			border-radius: 2.5px;
		}

		#config {
			border: 2px var(--border-style);
			border-radius: var(--border);
			padding: var(--border);
			background-color: var(--background);
			display: inline-block;
			width: 17.5em;

			a:link {
				color: var(--link, initial);
			}

			a:visited {
				color: var(--link-visited, initial);
			}
		}

		#volume input[type="range"] {
			width: 30%;
			height: 1em;
		}
	</style>

	<title>water drinking simulator</title>
	<link id="icon" rel="shortcut icon" href="assets/waterd33.ico">
	<meta charset="UTF-8">
</head>

<body onload="EmojiImg.convertPage();">
	<main></main>
	<script src="main.js"></script>
	<script src="data.js"></script>
	<button id="save" onclick="saveGame()">
		<emoji-img data="1F4bE"></emoji-img>
		save
	</button>
	<button id="reset" onclick="initGame()">
		<emoji-img data="1F504"></emoji-img>
		reset
	</button>

	<br><br>

	<div id="config">
		<div id="options">
			<strong>options:</strong>
			<br>
			<label for="autosave">autosave:</label>
			<input id="autosave" type="checkbox" onchange="saveGame('autosave')">
			<br>
			<label for="bgm">music:</label>
			<input id="bgm" type="checkbox" onchange="testBgmPlayback()" checked>
			<br>
			<label for="volume">volume:</label>
			<div id="volume">
				<label for="sound">
					<emoji-img data="1F50A"></emoji-img>
				</label>
				<input id="sound" type="range" max="1" step=".1" value="1" onchange="changeVolume()">
				<label for="music">
					<emoji-img data="1F3B5"></emoji-img>
				</label>
				<input id="music" type="range" max="1" step=".1" value=".5" onchange="changeVolume('music')">
			</div>
			<label for="theme">theme:</label>
			<select id="theme" onchange="setTheme()">
				<option value="default">default</option>
				<option value="basic">basic</option>
				<option value="light">light</option>
				<option value="dark">dark</option>
			</select>
		</div>
		<br>
		<div id="difficulty">
			<strong>gameplay modifiers:</strong>
			<button id="resetParam"
				onclick="for(x of document.getElementById('difficulty').getElementsByTagName('input'))x.value=undefined">
				<emoji-img data="1F504"></emoji-img>
			</button>
			<br>
			<span>bottle capacity:</span>
			<input id="bottleIn" type="number" min="1" max="100" placeholder="30">
			<br>
			<span>dehydration time:</span>
			<input id="speedIn" type="number" min="1" max="999" placeholder="90">
			<br>
			<span>cooldown:</span>
			<input id="cooldownIn" type="number" min="1" max="60" step="0.01" placeholder="2.28">
			<br>
			<small>*modifiers require game reset to apply</small>
		</div>
		<br>
		<div id="savedata">
			<strong>save data:</strong>
			<br>
			<textarea id="data" style="width:50%;height:3.5em;resize:none"></textarea>
			<div style="display:inline-block">
				<button onclick="exportData()">
					<emoji-img data="1F4E4"></emoji-img>
					export
				</button>
				<br>
				<button onclick="importData()">
					<emoji-img data="1F4E5"></emoji-img>
					import
				</button>
			</div>
			<br>
			<button onclick="repairData()">
				<emoji-img data="1F6E0"></emoji-img>
				fix save data
			</button>
			<span title="new updates can break things! check the changelog if a recent change may have broken your save data"
				style="opacity:.5;cursor:help" href="changelog">
				&#x1F6C8;
			</span>
		</div>
	</div>

	<br>
	<span>
		<small id="version">...</small>
		|
		<a class="small" href="about">about</a>
		|
		<a class="small" href="changelog">changelog</a>
	</span>

	<br><br>

	<small>
		<emoji-img data="1F36A"></emoji-img>
		this page uses cookies to save configuration and gameplay data
	</small>

	<script src="theme.js"></script>
</body>

</html>
